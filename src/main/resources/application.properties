spring.application.name=erp

spring.config.import=optional:file:.env[.properties]

#============================ Server Configuration
server.port=${SERVER_PORT:8080}

#============================ Threading (Virtual Threads)
spring.threads.virtual.enabled=true
spring.mvc.async.request-timeout=120000

#============================ AI Config (Spring AI - Google GenAI)
spring.ai.model.chat=google-genai
spring.ai.google.genai.api-key=${GOOGLE_API_KEY}
spring.ai.google.genai.chat.options.model=${AI_GEMINI_MODEL:gemini-2.5-flash}
spring.ai.google.genai.chat.options.temperature=${AI_GEMINI_TEMPERATURE:0.2}

# ============================ Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

#============================ JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=5000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

#============================ Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true
spring.flyway.out-of-order=false

#============================ Jackson Configuration
#spring.jackson.serialization.write-dates-as-timestamps=false
#spring.jackson.deserialization.fail-on-unknown-properties=false

#============================ Multipart File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

#============================ Swagger Config
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.paths-to-match=/api/**
springdoc.api-docs.path=/api/v1/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.use-root-path=true
springdoc.cache.disabled=true

#============================ Admin Config
admin.username=${ADMIN_USER_NAME}
admin.password=${ADMIN_PASSWORD}

#============================ JWT Config
security.jwt.signer-key=${JWT_SIGNER_KEY:9a4f2c8d3b7e1a5f2c8d3b7e1a5f2c8d3b7e1a5f2c8d3b7e1a5f2c8d3b7e1a5f}

#============================ Cloudinary Config
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.secure=true

logging.level.org.springframework.security=DEBUG
logging.file.path=logs
logging.file.name=app.log
management.endpoints.web.exposure.include=logfile
